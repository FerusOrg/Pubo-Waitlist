<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pubo — AI Social Media Management Platform</title>
    <meta name="description" content="Create, optimize, schedule and publish content across every social platform using AI. Join the Pubo waitlist for early access." />
    
    <!-- Preconnect for performance optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Canonical tag -->
    <link rel="canonical" href="https://pubowaitlist.vercel.app/" />
    
    <!-- Open Graph tags -->
    <meta property="og:title" content="Pubo — AI Social Media Management Platform" />
    <meta property="og:description" content="Create, optimize, schedule and publish content across every social platform using AI. Join the Pubo waitlist for early access." />
    <meta property="og:url" content="https://pubowaitlist.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pubowaitlist.vercel.app/logo.svg" />
    <meta property="og:site_name" content="Pubo" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pubo — AI Social Media Management Platform" />
    <meta name="twitter:description" content="Create, optimize, schedule and publish content across every social platform using AI. Join the Pubo waitlist for early access." />
    <meta name="twitter:image" content="https://pubowaitlist.vercel.app/logo.svg" />
    
    <!-- Robots meta -->
    <meta name="robots" content="index, follow" />

    <!-- Structured Data JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://pubowaitlist.vercel.app/#software",
          "name": "Pubo",
          "applicationCategory": "BusinessApplication, SocialMedia",
          "operatingSystem": "All",
          "offers": {
            "@type": "Offer",
            "price": "0.00",
            "priceCurrency": "USD"
          },
          "description": "An AI-powered social media management platform allowing multi-channel composing and optimal queue scheduling."
        },
        {
          "@type": "Organization",
          "@id": "https://pubowaitlist.vercel.app/#organization",
          "name": "Pubo",
          "url": "https://pubowaitlist.vercel.app/",
          "logo": "https://pubowaitlist.vercel.app/logo.svg"
        },
        {
          "@type": "WebSite",
          "@id": "https://pubowaitlist.vercel.app/#website",
          "url": "https://pubowaitlist.vercel.app/",
          "name": "Pubo",
          "publisher": {
            "@id": "https://pubowaitlist.vercel.app/#organization"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://pubowaitlist.vercel.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How does Pubo publish to all networks simultaneously?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Pubo connects directly to the official API of each network. When you write a post in our composer, it automatically handles character limits, image sizing, and formatting for each app before sending it out instantly."
              }
            },
            {
              "@type": "Question",
              "name": "Are my accounts secure?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Pubo doesn't store your passwords. We connect to each social platform securely using official, secure authorization. You can revoke access at any time from your social media settings."
              }
            },
            {
              "@type": "Question",
              "name": "Which platforms are supported at launch?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "We support direct posting to Twitter/X, LinkedIn, Instagram, and Threads. Support for TikTok, YouTube, and Facebook is coming soon in the next update."
              }
            },
            {
              "@type": "Question",
              "name": "Will signing up for the waitlist get me free access?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes! Early waitlist signups get permanent free access to basic tools. This includes 30 automated posts every month, lifetime draft rendering, and priority access to new features."
              }
            },
            {
              "@type": "Question",
              "name": "How does the referral system work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "When someone joins the waitlist using your referral link, your spot moves up by 12 places. Top referrers will also get early invites to test our private beta."
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
